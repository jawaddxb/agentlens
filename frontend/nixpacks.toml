[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p .next/standalone/.next/static",
  "mkdir -p .next/standalone/public",
  "cp -rv .next/static/. .next/standalone/.next/static/",
  "cp -rv public/. .next/standalone/public/"
]

[start]
cmd = "node .next/standalone/server.js"

